name: UI 自动化测试

on:
  # 定时触发：工作日每天 02:00 UTC（北京时间 10:00）
  schedule:
    - cron: '0 2 * * 1-5'

  # 手动触发，支持参数选择
  workflow_dispatch:
    inputs:
      env:
        description: '测试环境'
        required: true
        default: 'test'
        type: choice
        options: [test, staging, production]
      pytest_marks:
        description: 'pytest -m 标记（为空运行全部）'
        required: false
        default: ''
      pytest_keyword:
        description: 'pytest -k 关键字（为空运行全部）'
        required: false
        default: ''
      notify:
        description: '是否发送通知'
        required: false
        default: 'true'
        type: boolean

  # Push 触发（仅关键目录变更时触发）
  push:
    branches: [main, develop]
    paths:
      - 'testcases/**'
      - 'pages/**'
      - 'common/**'
      - 'config.yaml'
      - 'requirements*.txt'
      - 'ci_run.py'
  pull_request:
    branches: [main]
    paths:
      - 'testcases/**'
      - 'pages/**'

# 同一分支只保留最新一次运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-test:
    # runs-on: ubuntu-latest   # GitHub 公共云（无法访问内网）
    runs-on: self-hosted        # 内网自托管 Runner（可访问 mes.jaka.com）
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium

      - name: 执行 UI 测试
        env:
          ENV: ${{ github.event.inputs.env || 'test' }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ALLURE_CMD: allure
        shell: pwsh
        run: |
          $MARKS = "${{ github.event.inputs.pytest_marks }}"
          $KEYWORD = "${{ github.event.inputs.pytest_keyword }}"
          $ARGS = @()
          if ($MARKS) { $ARGS += "-m"; $ARGS += $MARKS }
          if ($KEYWORD) { $ARGS += "-k"; $ARGS += $KEYWORD }
          python ci_run.py @ARGS

      - name: 上传 Allure 原始数据
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-results-${{ github.run_number }}
          path: report/allure_results/
          retention-days: 7

      - name: 上传 Allure HTML 报告
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-report-${{ github.run_number }}
          path: report/allure_report/
          retention-days: 30

      - name: 上传 pytest-HTML 报告
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pytest-html-report-${{ github.run_number }}
          path: report/html/report.html
          retention-days: 30

      - name: 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: 发布 Allure 报告到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report/allure_report
          destination_dir: reports/${{ github.run_number }}
          keep_files: true

      - name: 输出报告访问地址
        if: always()
        shell: pwsh
        run: |
          $repo = "${{ github.repository }}"
          $parts = $repo.Split('/')
          $owner = $parts[0]
          $repoName = $parts[1]
          Write-Output "📊 Allure 报告地址: https://$owner.github.io/$repoName/reports/${{ github.run_number }}/index.html"

      - name: 钉钉通知
        if: always() && github.event.inputs.notify != 'false'
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          [ "$STATUS" != "success" ] && EMOJI="❌"
          ENV="${{ github.event.inputs.env || 'test' }}"
          curl -s -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msgtype\": \"markdown\",
              \"markdown\": {
                \"title\": \"UI自动化测试报告\",
                \"text\": \"## ${EMOJI} UI自动化测试完成\\n\\n- **环境**: ${ENV}\\n- **状态**: ${STATUS}\\n- **分支**: ${{ github.ref_name }}\\n- **运行**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
              }
            }" || true

      - name: 飞书通知
        if: failure() && github.event.inputs.notify != 'false'
        run: |
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"msg_type\": \"interactive\",
              \"card\": {
                \"header\": {
                  \"title\": {\"tag\": \"plain_text\", \"content\": \"❌ UI自动化测试失败\"},
                  \"template\": \"red\"
                },
                \"elements\": [{
                  \"tag\": \"div\",
                  \"text\": {
                    \"tag\": \"lark_md\",
                    \"content\": \"**环境**: ${{ github.event.inputs.env || 'test' }}\\n**分支**: ${{ github.ref_name }}\\n[查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"
                  }
                }]
              }
            }" || true
