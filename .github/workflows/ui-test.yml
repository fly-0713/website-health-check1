name: UI 自动化测试

on:
  # 定时触发：工作日每天 05:50 UTC（北京时间 13:50）
  schedule:
    - cron: '50 5 * * 1-5'

  # 手动触发，支持参数选择
  workflow_dispatch:
    inputs:
      env:
        description: '测试环境'
        required: true
        default: 'test'
        type: choice
        options: [test, staging, production]
      pytest_marks:
        description: 'pytest -m 标记（为空运行全部）'
        required: false
        default: ''
      pytest_keyword:
        description: 'pytest -k 关键字（为空运行全部）'
        required: false
        default: ''
      notify:
        description: '是否发送通知'
        required: false
        default: 'true'
        type: boolean

  # Push 触发（仅关键目录变更时触发）
  push:
    branches: [main, develop]
    paths:
      - 'testcases/**'
      - 'pages/**'
      - 'common/**'
      - 'config.yaml'
      - 'requirements*.txt'
      - 'ci_run.py'
  pull_request:
    branches: [main]
    paths:
      - 'testcases/**'
      - 'pages/**'

# 同一分支只保留最新一次运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-test:
    runs-on: ubuntu-latest   # GitHub 公共云（无法访问内网）
    # runs-on: self-hosted        # 内网自托管 Runner（可访问 mes.jaka.com）
    timeout-minutes: 30
  
    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 安装 Java（Allure 依赖）
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxf allure-${ALLURE_VERSION}.tgz -C /opt/
          ln -sf /opt/allure-${ALLURE_VERSION}/bin/allure /usr/local/bin/allure
          allure --version

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium

      - name: 执行 UI 测试
        env:
          ENV: ${{ github.event.inputs.env || 'test' }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ALLURE_CMD: allure
        run: |
          ARGS=()
          MARKS="${{ github.event.inputs.pytest_marks }}"
          KEYWORD="${{ github.event.inputs.pytest_keyword }}"
          [ -n "$MARKS" ] && ARGS+=("-m" "$MARKS")
          [ -n "$KEYWORD" ] && ARGS+=("-k" "$KEYWORD")
          python ci_run.py "${ARGS[@]}"

      - name: 上传 Allure 原始数据
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-results-${{ github.run_number }}
          path: report/allure_results/
          retention-days: 7

      - name: 上传 Allure HTML 报告
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-report-${{ github.run_number }}
          path: report/allure_report/
          retention-days: 30

      - name: 上传 pytest-HTML 报告
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pytest-html-report-${{ github.run_number }}
          path: report/html/report.html
          retention-days: 30

      - name: 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: 发布 Allure 报告到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report/allure_report
          destination_dir: reports/${{ github.run_number }}
          keep_files: true

      - name: 更新最新报告入口页
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          keep_files: true
          publish_dir: ./report/allure_report
          destination_dir: latest

      - name: 输出报告访问地址
        if: always()
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "=================================================="
          echo "📊 最新报告（每次覆盖）: https://$OWNER.github.io/$REPO/latest/index.html"
          echo "📅 本次报告（永久保留）: https://$OWNER.github.io/$REPO/reports/${{ github.run_number }}/index.html"
          echo "=========================================="

      - name: 钉钉通知
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          [ "$STATUS" != "success" ] && EMOJI="❌"
          ENV_NAME="${{ github.event.inputs.env }}"
          [ -z "$ENV_NAME" ] && ENV_NAME="test"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          REPORT_URL="https://$OWNER.github.io/$REPO/latest/index.html"
          curl -s -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"UI自动化测试报告\",\"text\":\"## ${EMOJI} UI自动化测试完成\n\n- **环境**: ${ENV_NAME}\n- **状态**: ${STATUS}\n- **分支**: ${{ github.ref_name }}\n- **触发**: ${{ github.actor }}\n- **运行**: [#${{ github.run_number }}](${RUN_URL})\n- **报告**: [查看Allure报告](${REPORT_URL})\"}}"\
            || echo '钉钉通知发送失败（不影响流程）'
