name: 系统检查

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:
    inputs:
      notify:
        description: '是否发送通知'
        required: false
        default: 'true'
        type: boolean
  push:
    branches: [main, develop]
    paths:
      - 'testcases/**'
      - 'pages/**'
      - 'common/**'
      - 'config.yaml'
      - 'requirements*.txt'
      - 'ci_run.py'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - test_login.py
          - test_JAKA_login.py
        include:
          - test_file: test_login.py
            site_name: MES后台
            webhook_secret: DINGTALK_MES_WEBHOOK
            allure_prefix: mes
            username_secret: MES_USERNAME
            password_secret: MES_PASSWORD
          - test_file: test_JAKA_login.py
            site_name: JAKA官网
            webhook_secret: DINGTALK_JAKA_WEBHOOK
            allure_prefix: jaka
            username_secret: JAKA_USERNAME
            password_secret: JAKA_PASSWORD
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 安装 Java（Allure 依赖）
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxf allure-${ALLURE_VERSION}.tgz -C /opt/
          ln -sf /opt/allure-${ALLURE_VERSION}/bin/allure /usr/local/bin/allure
          allure --version

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium

      - name: 执行测试 - ${{ matrix.site_name }}
        id: test
        env:
          # 从 Secrets 注入账号密码（每个站点使用自己的）
          MES_USERNAME: ${{ secrets.MES_USERNAME }}
          MES_PASSWORD: ${{ secrets.MES_PASSWORD }}
          JAKA_USERNAME: ${{ secrets.JAKA_USERNAME }}
          JAKA_PASSWORD: ${{ secrets.JAKA_PASSWORD }}
          
          # 测试文件配置
          TEST_FILE: ${{ matrix.test_file }}
          ALLURE_RESULTS_DIR: report/allure_results_${{ matrix.allure_prefix }}
        run: |
          # 创建独立的报告目录
          mkdir -p $ALLURE_RESULTS_DIR
          
          # 执行指定的测试文件
          python ci_run.py testcases/${{ matrix.test_file }} \
            --alluredir=$ALLURE_RESULTS_DIR \
            --maxfail=5
          
          # 生成 Allure 报告
          allure generate $ALLURE_RESULTS_DIR -o report/allure_report_${{ matrix.allure_prefix }} --clean

      - name: 上传 Allure 原始数据 - ${{ matrix.site_name }}
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-results-${{ matrix.allure_prefix }}-${{ github.run_number }}
          path: report/allure_results_${{ matrix.allure_prefix }}/
          retention-days: 7

      - name: 上传 Allure HTML 报告 - ${{ matrix.site_name }}
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-report-${{ matrix.allure_prefix }}-${{ github.run_number }}
          path: report/allure_report_${{ matrix.allure_prefix }}/
          retention-days: 30

      - name: 上传失败截图 - ${{ matrix.site_name }}
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failure-screenshots-${{ matrix.allure_prefix }}-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: 发布 Allure 报告到 GitHub Pages - ${{ matrix.site_name }}
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report/allure_report_${{ matrix.allure_prefix }}
          destination_dir: ${{ matrix.allure_prefix }}/reports/${{ github.run_number }}
          keep_files: true

      - name: 更新最新报告入口页 - ${{ matrix.site_name }}
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          keep_files: true
          publish_dir: ./report/allure_report_${{ matrix.allure_prefix }}
          destination_dir: ${{ matrix.allure_prefix }}/latest

      - name: 发送钉钉通知 - ${{ matrix.site_name }}
        if: always() && github.event.inputs.notify != 'false'
        env:
          WEBHOOK: ${{ secrets[matrix.webhook_secret] }}
          STATUS: ${{ job.status }}
          SITE_NAME: ${{ matrix.site_name }}
          TEST_FILE: ${{ matrix.test_file }}
          ALLURE_PREFIX: ${{ matrix.allure_prefix }}
        run: |
          # 修改路径为 venv/Scripts/
          python venv/Scripts/send_dingtalk_notify.py

      - name: 输出报告访问地址 - ${{ matrix.site_name }}
        if: always()
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "=================================================="
          echo "📊 ${{ matrix.site_name }} 最新报告: https://$OWNER.github.io/$REPO/${{ matrix.allure_prefix }}/latest/index.html"
          echo "📅 ${{ matrix.site_name }} 本次报告: https://$OWNER.github.io/$REPO/${{ matrix.allure_prefix }}/reports/${{ github.run_number }}/index.html"
          echo "=========================================="

  summary-notify:
    runs-on: ubuntu-latest
    needs: ui-test
    if: always() && github.event.inputs.notify != 'false'
    steps:
      - name: 发送汇总钉钉通知
        env:
          WEBHOOK: ${{ secrets.DINGTALK_SUMMARY_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "未配置汇总 Webhook，跳过"
            exit 0
          fi
          
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          MSG="## 📊 系统检查汇总\n\n"
          MSG="${MSG}- **分支**: ${{ github.ref_name }}\n"
          MSG="${MSG}- **触发**: ${{ github.actor }}\n"
          MSG="${MSG}- **运行**: [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n"
          MSG="${MSG}### 各站点报告\n"
          MSG="${MSG}- [MES后台报告](https://$OWNER.github.io/$REPO/mes/latest/index.html)\n"
          MSG="${MSG}- [JAKA官网报告](https://$OWNER.github.io/$REPO/jaka/latest/index.html)"
          
          curl -s -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"UI自动化测试汇总\",\"text\":\"${MSG}\"}}" \
            || echo '钉钉通知发送失败（不影响流程）'