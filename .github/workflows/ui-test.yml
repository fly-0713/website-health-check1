name: UI 自动化测试

on:
  # 定时触发：工作日每天 06:30 UTC（北京时间 14:30）
  schedule:
    - cron: '30 6 * * 1-5'

  # 手动触发，支持参数选择
  workflow_dispatch:
    inputs:
      env:
        description: '测试环境'
        required: true
        default: 'test'
        type: choice
        options: [test, staging, production]
      pytest_marks:
        description: 'pytest -m 标记（为空运行全部）'
        required: false
        default: ''
      pytest_keyword:
        description: 'pytest -k 关键字（为空运行全部）'
        required: false
        default: ''
      notify:
        description: '是否发送通知'
        required: false
        default: 'true'
        type: boolean

  # Push 触发（仅关键目录变更时触发）
  push:
    branches: [main, develop]
    paths:
      - 'testcases/**'
      - 'pages/**'
      - 'common/**'
      - 'config.yaml'
      - 'requirements*.txt'
      - 'ci_run.py'
  pull_request:
    branches: [main]
    paths:
      - 'testcases/**'
      - 'pages/**'

# 同一分支只保留最新一次运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-test:
    runs-on: ubuntu-latest   # GitHub 公共云（无法访问内网）
    # runs-on: self-hosted        # 内网自托管 Runner（可访问 mes.jaka.com）
    timeout-minutes: 30
  
    steps:
      - name: 检出代码
        uses: actions/checkout@v4.2.2

      - name: 安装 Java（Allure 依赖）
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Allure CLI
        run: |
          ALLURE_VERSION=2.27.0
          wget -q https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz
          tar -zxf allure-${ALLURE_VERSION}.tgz -C /opt/
          ln -sf /opt/allure-${ALLURE_VERSION}/bin/allure /usr/local/bin/allure
          allure --version

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: 安装 Playwright 浏览器
        run: playwright install chromium

      - name: 执行 UI 测试
        env:
          ENV: ${{ github.event.inputs.env || 'test' }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ALLURE_CMD: allure
        run: |
          ARGS=()
          MARKS="${{ github.event.inputs.pytest_marks }}"
          KEYWORD="${{ github.event.inputs.pytest_keyword }}"
          [ -n "$MARKS" ] && ARGS+=("-m" "$MARKS")
          [ -n "$KEYWORD" ] && ARGS+=("-k" "$KEYWORD")
          python ci_run.py "${ARGS[@]}"

      - name: 上传 Allure 原始数据
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-results-${{ github.run_number }}
          path: report/allure_results/
          retention-days: 7

      - name: 上传 Allure HTML 报告
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: allure-report-${{ github.run_number }}
          path: report/allure_report/
          retention-days: 30

      - name: 上传 pytest-HTML 报告
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pytest-html-report-${{ github.run_number }}
          path: report/html/report.html
          retention-days: 30

      - name: 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: 发布 Allure 报告到 GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report/allure_report
          destination_dir: reports/${{ github.run_number }}
          keep_files: true

      - name: 更新最新报告入口页
        if: always()
        uses: peaceiris/actions-gh-pages@v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          keep_files: true
          publish_dir: ./report/allure_report
          destination_dir: latest

      - name: 输出报告访问地址
        if: always()
        run: |
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "=================================================="
          echo "📊 最新报告（每次覆盖）: https://$OWNER.github.io/$REPO/latest/index.html"
          echo "📅 本次报告（永久保留）: https://$OWNER.github.io/$REPO/reports/${{ github.run_number }}/index.html"
          echo "=========================================="

      - name: 钉钉通知
        if: always()
        run: |
          python - <<'EOF'
          import os, json, urllib.request
          status = "${{ job.status }}"
          emoji  = "\u2705" if status == "success" else "\u274c"
          env_name = "${{ github.event.inputs.env }}" or "test"
          run_url  = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          repo     = "${{ github.repository }}"
          owner, repo_name = repo.split("/", 1)
          report_url = f"https://{owner}.github.io/{repo_name}/latest/index.html"
          text = (
              f"## {emoji} UI\u81ea\u52a8\u5316\u6d4b\u8bd5\u5b8c\u6210\n\n"
              f"- **\u73af\u5883**: {env_name}\n"
              f"- **\u72b6\u6001**: {status}\n"
              f"- **\u5206\u652f**: ${{ github.ref_name }}\n"
              f"- **\u89e6\u53d1**: ${{ github.actor }}\n"
              f"- **\u8fd0\u884c**: [#${{ github.run_number }}]({run_url})\n"
              f"- **\u62a5\u544a**: [\u67e5\u770bAllure\u62a5\u544a]({report_url})"
          )
          payload = json.dumps({"msgtype": "markdown", "markdown": {"title": "UI\u81ea\u52a8\u5316\u6d4b\u8bd5\u62a5\u544a", "text": text}}).encode()
          webhook = "${{ secrets.DINGTALK_WEBHOOK }}"
          if not webhook:
              print("\u672a\u914d\u7f6e DINGTALK_WEBHOOK\uff0c\u8df3\u8fc7\u901a\u77e5")
          else:
              req = urllib.request.Request(webhook, data=payload, headers={"Content-Type": "application/json"})
              try:
                  urllib.request.urlopen(req, timeout=10)
                  print("\u9489\u9489\u901a\u77e5\u53d1\u9001\u6210\u529f")
              except Exception as e:
                  print(f"\u9489\u9489\u901a\u77e5\u53d1\u9001\u5931\u8d25: {e}")
          EOF

