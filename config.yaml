# UI 自动化测试配置
# CI 环境通过 GitHub Secrets 注入账号密码：
#   MES_USERNAME / MES_PASSWORD  -> MES 后台账号
#   JAKA_USERNAME / JAKA_PASSWORD -> JAKA 官网账号

# MES 后台配置
mes:
  base_url: "https://mes.jaka.com/"
  headless: false
  timeout: 10000
  accounts:
    - username: "${MES_USERNAME}"
      password: "${MES_PASSWORD}"

# JAKA 官网配置（独立于 MES）
jaka_web:
  base_url: "https://www.jaka.com/zh"
  accounts:
    - username: "${JAKA_USERNAME}"
      password: "${JAKA_PASSWORD}"